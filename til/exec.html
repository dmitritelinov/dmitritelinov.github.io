					<div class="news_box">
						<p>This can be used to redirect all output from a shell into a file or another process without sending it to the current shell:
						<pre><code>bash
exec &gt; logfile
ls
cat /etc/passwd
exit</code></pre>
View the output:
<pre><code>cat logfile</code></pre></p>
