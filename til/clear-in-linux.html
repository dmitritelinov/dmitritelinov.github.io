					<h2>clear in Linux</h2>
					<div class="news_box">
						<p>Clears the screen in Linux terminal.<br/>
Key combination:
<pre><code>CRTL+L</code></pre><br/>
<strong>Alternative command 1</strong>:
<pre><code>printf "\033c"</code></pre>
<strong>Alternative command 2</strong>. Actually, this command performs a complete terminal re-initialization and might take longer:
<pre><code>reset</code></pre></p>
