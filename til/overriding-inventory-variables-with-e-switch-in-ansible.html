					<h2>Overriding inventory variables with -e switch in Ansible</h2>
					<div class="news_box">
<p>Let's suppose we have in inventory:
<pre><code>[centos]
centos1 ansible_port=2222</code></pre>
to override this to use the port 22 use <strong>-e</strong> switch:
<pre><code>ansible centos -m ping -e "ansible_port=22"</code></pre></p>
