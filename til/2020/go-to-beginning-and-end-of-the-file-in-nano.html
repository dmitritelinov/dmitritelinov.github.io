			<h2>Go to beginning and end of the file in nano</h2>
			<p>Press <strong>Alt+\</strong> - to go to the first line<br />
Press <strong>Alt+/</strong> - to go to the last line<br /><br />
as an alternative:<br />
<strong>Ctrl+_ Ctrl+v</strong> - moves to the top of the file<br />
<strong>Ctrl+_ Ctrl+y</strong> - to the bottom</p>
