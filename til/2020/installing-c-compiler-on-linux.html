			<h2>Installing C compiler on Linux</h2>
			<p>On RPM based:
<pre><code>sudo yum group install development-tools</code></pre>
On Deb based:
<pre><code>sudo apt-get install build-essentials</code></pre>
Verify installation:
<pre><code>cc --version
gcc --version</code></pre></p>
