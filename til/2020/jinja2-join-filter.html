        <body>
		<div class="wrap">
			<h2>jinja2 join filter</h2>
			<p>It iterates throught the list and join all items. So the final list will become <strong>rhel,debian,gentoo,arch</strong><br /><br />
<strong>vars.yml</strong>:
<pre><code>distributions:
  - rhel
  - debian
  - gentoo
  - arch</code></pre>
<strong>templates/page.j2</strong>:
<pre><code>...
{{ distributions|join(,) }} # rhel,debian,gentoo,arch
...</code></pre></p>
		</div>
