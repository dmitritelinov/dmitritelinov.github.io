			<h2>mail command in Linux - send email in cli</h2>
			<p><pre><code>echo "Message Body" | mail -s "Message Subject" target@email.tld</code></pre>
If <strong>mail</strong> command is not found in Debian/Ubuntu:
<pre><code>apt-get install mailutils</code></pre></p>
