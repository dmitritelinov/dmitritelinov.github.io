			<h2>Remove NVIDIA drivers and install open-source Nouveau display drivers in Debian</h2>
			<p>Recently I've run into issues with NVIDIA drivers on a newest kernel. The below steps solved them:
<pre><code>sudo apt purge *nvidia*
sudo apt install --reinstall xserver-xorg-core xserver-xorg-video-nouveau</code></pre></p>
