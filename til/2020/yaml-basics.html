			<h2>YAML basics</h2>
			<p>Comments:
<pre><code># this is comment</code></pre>
Key/Value pair:
<pre><code>Fruit: Apple
Vegetable: Carrot
Liquid: Water
Meat: Chicken</code></pre>
Array/List (ordered):
<pre><code>Fruits:
  - Orange
  - Apple
  - Banana</code></pre>
Dictionary/Map (unordered):
<pre><code>Banana:
  Calories: 105
  Fat: 0.4 g
  Carbs: 27 g</code></pre></p>
