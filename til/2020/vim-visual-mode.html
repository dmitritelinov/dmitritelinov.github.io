			<h2>Vim - visual mode</h2>
			<p><strong>v</strong> - enter visual mode<br />
<strong>V</strong> -  enter linevise visual mode<br />
<strong>Ctrl+v</strong> - enter visual block mode<br /><br />
<strong>o</strong> or <strong>O</strong> - you can move the end point blinking cursor<br />
<strong>u</strong> or <strong>U</strong> - set a highlighted character or region to be lower or UPPER<br /><br />
<strong>gv</strong> - re-select again after you perform changes on already selected area</p>
