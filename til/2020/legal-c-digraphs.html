			<h2>Legal C digraphs</h2>
			<p><strong>\a</strong>  Alert<br />
<strong>\b</strong>  Backspace<br />
<strong>\f</strong>  Form feed (or page advance)<br />
<strong>\n</strong>  New line<br />
<strong>\r</strong>  Carriage return<br />
<strong>\t</strong>  Horizontal tab<br />
<strong>\v</strong>  Vertical tab<br />
<strong>\'</strong>  Single quote<br />
<strong>\"</strong>  Double quote<br />
<strong>\?</strong>  Question mark<br />
<strong>\\</strong>  Backslash itself</p>
