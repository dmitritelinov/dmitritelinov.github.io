					<h2>Simulate a package installation with apt</h2>
					<div class="news_box">
If you want to simulate an installation or upgrade for a package(s) without changing anything in system use the <strong>--simulate</strong> (<strong>-s, --just-print, --dry-run, --recon, --no-act</strong>) option for apt:
<pre><code>sudo apt install htop --simulate</code></pre>
