		<div class="wrap">
			<h2>vim help</h2>
			<p><strong>:help</strong> or <strong>:h</strong> - enter help mode. <strong>/string</strong> - is for search for a string in help<br /><br/>
			<strong>:help string</strong> - search for string in help. <strong>Ctrl+f</strong> is page down, <strong>Ctrl+b</strong> is page up in order to move around,<br /><br/>
			<strong>/usr/share/vim/vim80/doc</strong> - directory with documentation, you can use <strong>grep -wn string *</strong> here.</p>
