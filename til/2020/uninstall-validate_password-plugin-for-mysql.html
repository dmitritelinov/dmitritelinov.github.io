			<h2>Uninstall validate_password plugin for MySQL</h2>
			<p>If these types of errors:
<pre><code>ERROR 1819 (HY000): Your password does not satisfy the current policy requirements</code></pre>
become annoying for you, you can choose to uninstall this plugin completely from MySQL:
<pre><code>mysql&gt; uninstall plugin validate_password;</code></pre></p>
