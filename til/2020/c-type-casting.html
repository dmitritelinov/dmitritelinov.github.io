			<h2>C type casting</h2>
			<p><pre><code>#include &lt;stdio.h&gt;

int main()
{
	printf("The number of eggs for the day:");

	int eggs;
	scanf("%i", &amp;eggs);

	double dozen = (double) eggs / 12; // type casting for eggs variable

	printf("You have %f dozen eggs.\n", dozen);

	return 0;
}</code></pre></p>
