			<h2>View kernel messages in Linux</h2>
			<p>Traditional utulity to view th kernel ring buffer:
<pre><code>dmesg</code></pre>
A systemd utility to view the kernel ring buffer within the systemd journal:
<pre><code>journalctl -k</code></pre></p>
