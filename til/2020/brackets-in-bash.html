					<h2>Brackets in bash</h2>
					<div class="news_box">
Are used to match a character from range:<br />
<strong>[[:upper:]]</strong> or <strong>[A-Z]</strong><br />
<strong>[[:lower:]]</strong> or <strong>[a-z]</strong><br />
<strong>[[:digit:]]</strong> or <strong>[0-9]</strong><br />
<strong>[[:alpha:]]</strong> or <strong>[a-zA-Z]</strong><br />
<strong>[[:alphanum:]]</strong> or <strong>[a-zA-Z0-9]</strong><br /><br />
Example:
<pre><code>$ ls file_[[:digit:]]
file_1  file_2  file_3  file_4</code></pre>
