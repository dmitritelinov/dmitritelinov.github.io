			<h2>Replace string with another string with regexp in Ansible</h2>
			<p>This is the playbook which replaces param=[[number]] with newparam=19.<br/><br/>
<strong>1.txt</strong>
<pre><code>test1 test2 param=13 test4</code></pre>
<strong>pl.yml</strong>
<pre><code>- name: Replace
  replace:
    path: ./1.txt
    regexp: '(param=)([0-9]{2}|[0-9]{1})'
    replace: 'newparam=19'</code></pre></p>
