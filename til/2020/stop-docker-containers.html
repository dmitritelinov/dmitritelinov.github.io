			<h2>Stop Docker containers</h2>
			<p><strong>SIGKILL</strong>
<pre><code>docker kill container</code></pre>
<strong>SIGTERM</strong>
<pre><code>docker stop container</code></pre>
<strong>stop</strong> will wait 10 seconds by default, after that will do a <strong>kill</strong> of container if receives no responce.</p>
