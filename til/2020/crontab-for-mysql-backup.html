        <body>
		<div class="wrap">
			<h2>Crontab for MySQL backup</h2>
			<p><pre><code>20 4 * * * root mysqldump -u root -p{{PASSWORD}} --all-databases | gzip -9 &gt; {{BACKUP_PATH}}/db_`date +'%m-%d-%Y'`.sql.gz</code></pre></p>
		</div>
        </body>
