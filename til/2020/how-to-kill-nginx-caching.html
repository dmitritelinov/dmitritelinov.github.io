		<div class="wrap">
			<h2>How to kill nginx caching</h2>
			<p>Put inside <strong>location</strong> directive:
<pre><code>add_header Last-Modified $date_gmt;
add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
if_modified_since off;
expires off;
etag off;</code></pre></p>
