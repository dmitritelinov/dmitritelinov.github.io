					<h2>How to scroll inside screen</h2>
					<div class="news_box">
					<ol><li>Hit screen prefix combination <b>ctrl+A</b>, then hit <b>Esc</b></li>
					<li>Move up/down with the arrow keys <b>↑</b> and <b>↓</b> or vim-like commands <b>ctrl-b</b> and <b>ctrl-f</b> for scrolling page up/down</li>
					<li>When you're done, hit <b>q</b> or <b>Esc</b> to get back to the end of the scroll buffer</li></ol>
