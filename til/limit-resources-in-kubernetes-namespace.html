					<h2>Limit resources in Kubernetes namespace</h2>
					<div class="news_box">
						<p>Use <strong>ResourceQuota</strong> object.<br/><br/>
						<strong>quota.yml</strong>:
						<pre><code>apiVersion: v1
kind: ResourceQuota
metadata:
  name: ns-quota
  namespace: dev
spec:
  hard:
    pods: "10"
    requests.cpu: "4"
    requests.memory: 5Gi
    limits.cpu: "10"
    limits.memory: 10Gi</code></pre></p>
