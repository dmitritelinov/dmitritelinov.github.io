					<h2>Prevent ssh from disconnecting on client side</h2>
					<div class="news_box">
						<p><strong>~/.ssh/config</strong>:
						<pre><code>ServerAliveInterval 10</code></pre><br/>
<strong>ServerAliveInterval</strong>: number of seconds that the client will wait before sending a null packet to the server (to keep the connection alive).</p>
