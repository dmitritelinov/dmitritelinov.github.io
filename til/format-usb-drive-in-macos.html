					<h2>Format USB drive in MacOS</h2>
					<div class="news_box">
<p>List all disks in system:
<pre><code>diskutil list</code></pre><br/>
Unmount USB stick (if mounted). <b>/dev/disk2</b> - is the USB drive:
<pre><code>diskutil umountDisk /dev/disk2</code></pre><br/>
Format in FAT32 the disk and label it as <b>Stick</b>:
<pre><code>sudo diskutil eraseDisk FAT32 Stick MBRFormat /dev/disk2</code></pre></p>
