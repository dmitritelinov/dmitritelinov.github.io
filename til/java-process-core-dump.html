					<h2>Java process core dump</h2>
					<div class="news_box">
						<p>Get java process PID:
<pre><code>ps -ef|grep java # java process pid</code></pre>
Run debugger:
<pre><code>sudo gdb —pid=<strong>XXXX</strong></code></pre>
Save to a file and quit from gdb:
<pre><code>gcore /tmp/jvm.core
detach
quit</code></pre></p>
