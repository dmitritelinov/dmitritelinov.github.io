					<h2>Make Skaffold to install/upgrade Helm chart within given timeout</h2>
					<div class="news_box">
<p>Add the following to skaffold.yml. The Helm chart should install/upgrade within the 10min timeout:
<pre><code>deploy:
  helm:
    flags:
      upgrade: ["--timeout", "600s"]
      install: ["--timeout", "600s"]</code></pre></p>
