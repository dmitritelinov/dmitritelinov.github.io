					<h2>Check password protected certificate expiration date with OpenSSL</h2>
					<div class="news_box">
					<b>PKS</b>
					<pre><code>openssl pkcs12 -passin pass:{{cert_password}} \
-passout pass:{{cert_password}} -in certificate.p12 \
-out /dev/stdout | openssl x509 -in /dev/stdin -noout -enddate</code></pre>
                                        <b>X509</b>
					<pre><code>openssl x509 -in certificate.crt -noout -enddate</code></pre>
					</div>
