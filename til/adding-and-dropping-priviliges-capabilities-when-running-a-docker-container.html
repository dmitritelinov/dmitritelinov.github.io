					<h2>Adding and dropping priviliges (capabilities) when running a Docker container</h2>
					<div class="news_box">
<p>Add capability:
<pre><code>docker run --cap-add MAC_ADMIN ubuntu</code></pre>
Drop capability:
<pre><code>docker run --cap-drop KILL ubuntu</code></pre>
Run the Docker container with all capabilities enabled:
<pre><code>docker run --privileged ubuntu</code></pre></p>
