					<h2>sort data in tabular format with sort with -k option</h2>
					<div class="news_box">
<p>Let's sort output of ls - first 20 lines, 5th column - by file size, numerically:
<pre><code>ls -l /etc/ | head -n 20 | sort -k 5n</code></pre>
Sort by month (M - option):
<pre><code>ls -l /etc/ | head -n 20 | sort -k 6M</code></pre></p>
