					<h2>Scaling Replicaset</h2>
					<div class="news_box">
						<p><ul><li>Update definition file:
								<pre><code>kubectl replace -f replicaset-definition.yml</code></pre></li>
								<li>Use scale option with file:
									<pre><code>kubectl scale --replicas=6 -f replicaset-definition.yml</code></pre></li>
									<li>Use scale option with type:
										<pre><code>kubectl scale --replicas=6 rs rs-nginx</code></pre></li></ul></p>
