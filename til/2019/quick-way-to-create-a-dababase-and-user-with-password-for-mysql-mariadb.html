			<h2>Quick way to create a dababase and user with password for MySQL/MariaDB</h2>
			<p><pre><code>CREATE DATABASE <strong>db_name</strong>; 
CREATE USER '<strong>db_usr</strong>'@'%' IDENTIFIED BY '<strong>db_pwd</strong>';
GRANT ALL PRIVILEGES ON <strong>db_name</strong>.* TO '<strong>db_usr</strong>'@'%';
FLUSH PRIVILEGES;</code></pre></p>
		</div>
