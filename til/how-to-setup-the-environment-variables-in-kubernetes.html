					<h2>How to setup the environment variables in Kubernetes</h2>
					<div class="news_box">
						<p><strong>spec.containers.env</strong> is an array:
						<pre><code>env:
- name: APP_COLOR
  value: green</code></pre>
A Docker alternative for the above definition is:
<pre><code>docker run -e APP_COLOR=green simple-webapp-color</code></pre></p>
