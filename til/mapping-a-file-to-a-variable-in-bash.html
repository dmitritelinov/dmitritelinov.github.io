					<h2>Mapping a file to a variable in bash</h2>
					<div class="news_box">
						<p>On Unix-like operating systems, <strong>mapfile</strong> is a builtin command of the Bash shell. It reads lines from standard input into an indexed array variable.
<pre><code>mapfile remote.txt
echo "Hello this is first line: ${MAPFILE[0]}"</code></pre></p>
