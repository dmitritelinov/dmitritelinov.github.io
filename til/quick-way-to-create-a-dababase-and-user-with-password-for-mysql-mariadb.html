					<h2>Quick way to create a dababase and user with password for MySQL/MariaDB</h2>
					<div class="news_box">
<pre><code>CREATE DATABASE <b>db_name</b>; 
CREATE USER '<b>db_usr</b>'@'%' IDENTIFIED BY '<b>db_pwd</b>';
GRANT ALL PRIVILEGES ON <b>db_name</b>.* TO '<b>db_usr</b>'@'%';
FLUSH PRIVILEGES;</code></pre>
