			<h2>Default rollout history limit in Kubernetes</h2>
			<p>Every Deployment has its own revision limit stored in its ReplicaSet in this field <strong>.spec.revisionHistoryLimit</strong>. The respective ReplicaSet needs to be updated in order to change the revision limit.</p>
