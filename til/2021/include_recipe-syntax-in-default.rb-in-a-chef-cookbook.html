			<h2>include_recipe syntax in default.rb in a Chef cookbook</h2>
			<p><pre><code>include_recipe 'cookbook::recipe'</code></pre>
This can be invoked in this form and the <strong>default.rb</strong> will be called:
<pre><code>chef-client -z -r "cookbook"</code></pre>
this is shorthand for:
<pre><code>chef-client -z -r "cookbook::default"</code></pre></p>
