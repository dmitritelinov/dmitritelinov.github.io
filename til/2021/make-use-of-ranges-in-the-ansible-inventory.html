			<h2>Make use of ranges in the Ansible inventory</h2>
			<p>In inventory:
<pre><code>[centos]
centos1 ansible_port=2222
centos<strong>[2:3]</strong> ansible_user=root

[ubuntu]
ubuntu<strong>[1:3]</strong> ansible_become=true ansible_become_password=password</code></pre></p>
