			<h2>Label a Kubernetes node</h2>
			<p>To label a node, use the command:
			<pre><code>kubectl label nodes {{ node }} {{ label-key }}={{ label-value }}</code></pre></p>
			<p>Example:
			<pre><code>kubectl label nodes node1 size=Large</code></pre></p>
