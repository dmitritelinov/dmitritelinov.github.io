			<h2>Inheriting groups in Ansible inventory</h2>
			<p>Let's suppose that the groups <strong>[centos]</strong> and <strong>[ubuntu]</strong> are already defined in the inventory. Then:
<pre><code>[linux:children]
centos
ubuntu</code></pre>
this group which have as children <strong>centos</strong> and <strong>ubuntu</strong> groups will inherit all hosts from the groups <strong>[centos]</strong> and <strong>[ubuntu]</strong></p>
