			<h2>View the logs of a Kubernetes Pod</h2>
			<p>Use this command:
			<pre><code>kubectl logs sample-pod</code></pre>
Also you can stream them live:
<pre><code>kubectl logs -f sample-pod</code></pre>
If there are multiple containers in the pod, you must specify container name:
<pre><code>kubectl logs sample-pod -c nginx</code></pre></p>
