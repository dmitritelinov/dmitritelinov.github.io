        <body>
		<div class="wrap">
			<h2>bash script to ping multiple IPs</h2>
			<p><pre><code>#!/usr/bin/env bash

IPFILE="iplist.txt"

for ip in $(cat $IPFILE)
do
	ping -c1 $ip &gt; /dev/null
	if [ $? -eq 0 ]
	then
	echo $ip is GOOD
	else
	echo $ip is NOT GOOD
	fi
done</code></pre></p>
