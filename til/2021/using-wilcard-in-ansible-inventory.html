			<h2>Using wilcard in Ansible inventory</h2>
			<p><pre><code>ansible -i inv '*' -m ping</code></pre>
is equivalent to:
<pre><code>ansible -i inv all -m ping</code></pre>
or to limit a specific hosts:
<pre><code>ansible -i inv 'ubuntu*' -m ping
ansible -i inv 'centos*' -m ping</code></pre></p>
