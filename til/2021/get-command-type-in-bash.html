					<h2>Get command type in bash</h2>
					<div class="news_box">
						<p>There are two types of commands in bash: internal (builtin) and external (binaries) commands.<br/><br/>
						The type can be determined by <strong>type</strong> command. For example:
						<pre><code>$ type echo
echo is a shell builtin
$ type mv
mv is /usr/bin/mv</code></pre></p>
