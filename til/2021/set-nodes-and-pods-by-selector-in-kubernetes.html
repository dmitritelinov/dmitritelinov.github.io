			<h2>Get nodes and pods by selector in Kubernetes</h2>
			<p>Nodes:
			<pre><code>kubectl get nodes --selector beta.kubernetes.io/arch=amd64,beta.kubernetes.io/os=linux</code></pre>
Pods:
<pre><code>kubectl get pods --selector app=App1,tier=frontend</code></pre>
You can also use <strong>-l</strong> (labels) option, it is the same - it supports '=', '==', and '!='</p>
