			<h2>Ansible list hosts in specific group</h2>
			<p><pre><code>ansible ubuntu --list-hosts
ansible centos --list-hosts</code></pre>
We can list all hosts:
<pre><code>ansible all --list-hosts</code></pre>
Using <strong>regexp</strong>s for hosts ending in 3:
<pre><code>ansible ~.*3 --list-hosts</code></pre></p>
