        <body>
		<div class="wrap">
			<h2>Basic implementation of user and group resources in Chef</h2>
			<p><pre><code>user 'user1' do
  comment 'This is a user1'
  uid '123'
  home '/home/user1'
  shell '/bin/bash'
end

group 'admins' do
  members 'user1'
  append true
end</code></pre></p>
