			<h2>tmux rename session</h2>
			<p>If you started tmux without any arguments, the name for session was given the <strong>[0]</strong>, you can see it in the status bar.<br/><br/>
To rename session use:
<pre><code>tmux rename-session namedSession</code></pre>
now  in the status bar on the left-hand side instead of <strong>[0]</strong>, it should now say <strong>[namedSession]</strong>.</p>
