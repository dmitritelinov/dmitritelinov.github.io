					<h2>Special symbols with sudo in bash</h2>
					<div class="news_box">
<p>This will not work:
<pre><code><del>sudo echo 1 &gt; /proc/sys/net/ip_forward</del></code></pre><br/>
otherwise use:
<pre><code>echo 1 &gt; sudo tee /proc/sys/net/ip_forward</code></pre><br/>
because <strong>&gt;</strong> occurs first by priority and <strong>sudo</strong> at the end</p>
