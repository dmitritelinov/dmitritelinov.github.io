					<h2>Disable automatic sleep in Debian testing</h2>
					<div class="news_box">
Edit /etc/gdm3/greeter.dconf-defaults.<br /><br />
At <strong>Automatic suspend</strong> section (at the end of config file) set line:<pre><code>sleep-inactive-ac-type='blank'</code></pre>
