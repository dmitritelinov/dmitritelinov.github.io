			<h2>SELinux labels on files, processes and sockets</h2>
			<p>When you issue on a system where SELinux is enabled:
			<ul><li>for file
					<pre><code>ls -lZ /usr/sbin/httpd</code></pre></li>
			<li>process
<pre><code>ps axZ | grep httpd</code></pre></li>
<li>socket
<pre><code>netstat -tnlpZ | grep http</code></pre></li></ul></p>
