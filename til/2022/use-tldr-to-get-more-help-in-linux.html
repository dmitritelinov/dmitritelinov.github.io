			<h2>Use tldr to get more help in Linux</h2>
			<p>tldr - Simplified and community-driven man pages<br/><br/>
Install:
<pre><code>apt install tldr</code></pre>
Update the pages:
<pre><code>tldr -u</code></pre>
View a sample page:
<pre><code>tldr ss</code></pre></p>
