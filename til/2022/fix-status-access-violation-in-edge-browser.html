			<h2>Fix STATUS_ACCESS_VIOLATION in Edge browser</h2>
			<p>After upgrade seems that some files were corrupted. For me the fix was the following:
			<pre><code>DISM.exe /Online /Cleanup-image /Restorehealth</code></pre>
then
<pre><code>sfc /scannow</code></pre>
both need to be run from CMD with admin rights</p>
