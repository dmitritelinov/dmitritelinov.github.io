			<h2>break in Python</h2>
			<p><pre><code>cars = ["ok", "ok", "ok", "faulty", "ok", "ok"]
for status in cars:
  if status == "faulty":
    print("Stopping the production line!")
    break
  print(f"This car is {status}.")</code></pre>
Output:
<pre><code>This car is ok.
This car is ok.
This car is ok.
Stopping the production line!</code></pre></p>
