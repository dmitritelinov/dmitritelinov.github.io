			<h2>Show your global and per-link DNS settings in Debian/Ubuntu</h2>
			<p><pre><code>resolvectl status</code></pre>
If you are using systemd version earlier than 239 use:
<pre><code>systemd-resolve --status</code></pre>
Also, the following command is helpful for troubleshooting DNS issues:
<pre><code>journalctl -u systemd-resolved -f</code></pre></p>
