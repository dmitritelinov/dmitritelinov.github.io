		<div class="wrap">
			<h2>Show file descriptors in Linux</h2>
			<p><pre><code>ls -l /proc/{{ PID }}/fd</code></pre>
			where <strong>{{ PID }}</strong> is the PID of the process.<br/>
0, 1, 2 are STDIN, STDOUT and STDERR respectively.</p>
