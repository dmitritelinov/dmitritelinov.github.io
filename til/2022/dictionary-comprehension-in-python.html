			<h2>Dictionary comprehension in Python</h2>
			<p>Example:
			<pre><code>friends = ["Rolf", "Bob", "Jen", "Anne"]
time_since_seen = [3, 7, 15, 11]

long_timers = {
  friends[i]: time_since_seen[i]
  for i in range(len(friends))
  if time_since_seen[i] &gt; 5
}

print(long_timers)</code></pre>
Output:
<pre><code>{'Bob': 7, 'Jen': 15, 'Anne': 11}</code></pre></p>
