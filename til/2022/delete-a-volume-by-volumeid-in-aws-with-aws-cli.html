			<h2>Delete a volume by volumeID in AWS with aws-cli</h2>
			<p>If you have a <strong>volumeID</strong> you can easily delete a volume. First make sure that it is not used (detached) and delete it by <strong>volumeID</strong>:
			<pre><code>aws ec2 delete-volume --volume-id {{ volumeID }}</code></pre></p>
