			<h2>Match whole words when searching with grep in Linux</h2>
			<p>We can use <strong>-w</strong> option to match the words when searching with grep.<br/><br/>
Example in CentOS:
<pre><code>grep -wi 'red' /etc/os-release</code></pre></p>
