        <body>
		<div class="wrap">
			<h2>Script to log only defined keywords from /var/log/messages</h2>
			<p><pre><code>#!/bin/bash

tail -fn0 /var/log/messages | while read line
do
	echo $line | egrep -i "refused|invalid|error|fail|lost|shut|down|offline"
	if [ $? -eq 0 ]
	then
		echo $line &gt;&gt; /tmp/filtered-messages
	fi
done</code></pre></p>
		</div>
        </body>
