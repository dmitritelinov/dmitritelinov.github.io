			<h2>Configure Atom text editor for Python development</h2>
			<p>Install plugins:
			<pre><code>file-icons
script
autocomplete-python</code></pre>
For autocomplete-python - jedi is needed:
<pre><code>pip install jedi</code></pre>
Disable plugins:
<pre><code>autocomplete-snippets
autocomplete-plus</code></pre></p>
