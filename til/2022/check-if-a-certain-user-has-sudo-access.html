			<h2>Check if a certain user has sudo access</h2>
			<p>To check if a certain user has sudo access, use:
<pre><code>sudo -l -U user_name</code></pre>
If the user doesn’t have sudo rights, you should see this:
<pre><code>User is not allowed to run sudo on server</code></pre></p>
