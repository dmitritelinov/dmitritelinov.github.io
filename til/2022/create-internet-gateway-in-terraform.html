			<h2>Create Internet Gateway in Terraform</h2>
			<p>First, <a href="/til/2022/terraform-example-create-vpc-on-aws.html">create VPC</a> as subnet attaches to VPC id.<br/>
Next, add to your Terraform code:
<pre><code>resource "aws_internet_gateway" "mtc_internet_gateway" {
  vpc_id = aws_vpc.mtc_vpc.id

  tags = {
    Name = "dev-igw"
  }
}</code></pre>
Finally, run plan and apply</p>
