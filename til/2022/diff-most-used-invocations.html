			<h2>diff most used invocations</h2>
			<p>The utility diff is a data comparison tool that computes and displays the differences between the contents of files. The possible invocations:
<pre><code>diff file1 file2 # show differences
diff -c file1 file2 # show context
diff -y file1 file2 # similar to sdiff file1 file2</code></pre></p>
