        <body>
		<div class="wrap">
			<h2>Script to check if home directories are assigned to a user</h2>
			<p><pre><code>#!/bin/bash

cd /home
for DIR in *
do
	CHK=$(grep -c "/home/$DIR" /etc/passwd)
	if [ $CHK -ge 1 ]
	then
		echo "$DIR is assigned to a user"
	else
		echo "$DIR is NOT assigned to a user"
	fi
done</code></pre></p>
