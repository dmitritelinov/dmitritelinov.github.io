			<h2>Short introduction about pinfo documentation pages in Linux</h2>
			<p>Invocation example:
			<pre><code>pinfo coreutils 'whoami invocation'</code></pre>
Navigation:
<pre><code>U - go up
N - go next
P - go previous
Q - quit</code></pre>
Go to the best word match of the info document:
<pre><code>pinfo -a whoami</code></pre></p>
