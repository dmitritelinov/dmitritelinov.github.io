			<h2>Pin a process to specific CPU using taskset in Linux</h2>
			<p>Let's have a process:
			<pre><code># dd if=/dev/zero of=/dev/null</code></pre>
By using this command:
<pre><code># taskset -pc 3 $(pidof dd)</code></pre>
will set this process to the 3rd CPU</p>
