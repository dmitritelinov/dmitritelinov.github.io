			<h2>Create a EBS volume using aws-cli example</h2>
			<p><pre><code>aws ec2 create-volume --size 10 --region eu-west-1 --availability-zone eu-west-1a --volume-type gp2 \
--tag-specifications 'ResourceType=volume, Tags[{Key=KubernetesCluster, Value=kubernetes.example.com}]'</code></pre>
Note down <strong>VolumeID</strong>, you might need it.</p>
