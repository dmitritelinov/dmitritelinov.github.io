			<h2>xargs with -I option</h2>
			<p>Without -I option:
			<pre><code>$ seq 1 3 | xargs echo test
test 1 2 3</code></pre>
With -I option:
<pre><code>$ seq 1 3 | xargs -I{} echo test {}
test 1
test 2
test 3</code></pre></p>
