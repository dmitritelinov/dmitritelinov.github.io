			<h2>Capturing with tcpdump for viewing with Wireshark</h2>
			<p>Older versions of tcpdump truncate packets to 68 or 96 bytes. If this is the case, use -s to capture full-sized packets:
<pre><code>tcpdump -i {{ interface }} -s 65535 -w {{ file }}</code></pre></p>
