			<h2>grep - escaping for special characters</h2>
			<p>To escape special character, we just add a <strong>\</strong> (backslash) before it.
Instead of:
<pre><code>grep '.' /etc/login.defs</code></pre>
use:
<pre><code>grep '\.' /etc/login.defs</code></pre></p>
