        <body>
		<div class="wrap">
			<h2>Regex asterisk - match the previous element 0 or more times</h2>
			<p><strong>let*</strong> will match:
			<pre><code>le
let
lett
lettt</code></pre>
and so on.<br/><br/>
So another way of saying this is that the * allows the previous element - t in this case, to be either omitted entirely or to appear once or multiple times.</p>
