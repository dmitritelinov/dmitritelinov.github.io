		<div class="wrap">
			<h2>What to do when Helm release stuck with status "pending-upgrade"</h2>
			<p>Just delete corresponding Helm secret:
<pre><code>kubectl get secrets
kubectl delete secret sh.helm.release.v1.{{ RELEASE_NAME }}.v{{ LATEST_REVISION }}</code></pre>
</p>
