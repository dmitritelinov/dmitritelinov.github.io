			<h2>Viewing and changing default systemd target</h2>
			<p>To view the default target:
			<pre><code>systemctl get-default</code></pre>
You can also check this symlink:
<pre><code>ls -lt /etc/systemd/system/default.target</code></pre>
To change the default target use this command:
<pre><code>systemctl set-default multi-user.target</code></pre></p>
