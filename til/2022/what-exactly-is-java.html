			<h2>What exactly is Java?</h2>
			<p>Java is an object-oriented programming language that produces software for multiple platforms. When a programmer writes a Java application, the compiled code (known as bytecode) runs on most Operating Systems, including Windows, Linux and Mac OS.</p>
