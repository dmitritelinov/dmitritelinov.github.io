			<h2>Disable using cache for the job in GitLab</h2>
			<p>Gitlab offers the possibility of disabling the cache for the jobs that do not need it.<br/><br/>
This can be done by using the configuration:
<pre><code>cache: {}</code></pre>
inside the jobs that you don't want to use cache.</p>
