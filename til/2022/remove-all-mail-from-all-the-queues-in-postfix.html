			<h2>Remove all mail from all the queues in Postfix</h2>
			<p>All the queues - hold, incoming, active and deferred:
<pre><code>postsuper -d ALL</code></pre>
To remove all mails in the deferred queue only, run :
<pre><code>postsuper -d ALL deferred</code></pre></p>
