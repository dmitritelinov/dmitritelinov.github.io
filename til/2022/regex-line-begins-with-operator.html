			<h2>regex - line begins with operator</h2>
			<p>This is character <strong>^</strong> and using this operator returns the lines that starts with given search term.<br/>
Example 1:
<pre><code>$ grep '^sam' namex.txt
samad
samuel</code></pre>
Example 2:
<pre><code>$ grep '^PASS' /etc/login.defs 
PASS_MAX_DAYS	99999
PASS_MIN_DAYS	0
PASS_WARN_AGE	7</code></pre></p>
