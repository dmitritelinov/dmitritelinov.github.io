			<h2>Search in specific sections with apropos in Linux</h2>
			<p>You can use -s option to pass the man page sections for the found commands by the apropos command. Example:
<pre><code>apropos -s 1,8 director</code></pre>
It will output the commands from man pages sections 1 and 8 which contains the word <strong>director</strong>
</p>
