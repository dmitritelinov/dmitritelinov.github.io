		<div class="wrap">
			<h2>Regex brackets - previous element can exist "this many" times</h2>
			<p><pre><code>egrep -r '0{3,}' /etc</code></pre>
will match 000 at least
<pre><code>egrep -r '10{,3}' /etc</code></pre>
will match 1 followed by most 000. This will also match 1s following by no 0s
<pre><code>egrep -r '0{3}' /etc</code></pre>
will fins all strings that have exactly three 0s</p>
