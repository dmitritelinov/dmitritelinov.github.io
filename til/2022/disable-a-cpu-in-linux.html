			<h2>Disable a CPU in Linux</h2>
			<p><pre><code>echo 0 &gt; /sys/bus/cpu/devices/cpu3/online</code></pre>
			to re-enable it - <strong>echo 1</strong>.<br/>
To check the status:
<pre><code>lscpu</code></pre></p>
